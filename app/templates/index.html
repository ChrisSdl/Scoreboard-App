<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Scoreboard</title>

<style>
/* ================= VIDEO BACKGROUND ================= */
.video-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: -2; /* Hinter allem */
}

.video-background video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
}

/* ================= BODY ================= */
body {
    font-family: Arial;
    color: white;
    padding: 40px;
    margin: 0;

    /* Fallback Background (für den Fall, dass Video nicht lädt) */
    background: radial-gradient(circle at 20% 20%, #ff0077 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #00ccff 0%, transparent 40%),
                linear-gradient(135deg, #1a0033, #3a005a, #000000);
    background-blend-mode: screen;
    min-height: 100vh;
    position: relative; /* wichtig für Overlay/Scoreboard */
}

/* ================= SCOREBOARD ================= */
#scoreboard {
    display: flex;
    justify-content: space-between;
    gap: 40px;
	background: rgba(0, 0, 0, 0.55);
	backdrop-filter: blur(10px);
}

/* ================= Aufteilung der Teams auf 2 Spalten um Links und Rechts anzuzeigen ================= */
.column {
    width: 48%;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* ================= TEAM ROW ================= */
.team {
    display: grid;
    grid-template-columns: 50px 70px 60px 1fr 150px;
    align-items: center;
    gap: 20px;
    padding: 15px 20px;
    margin-bottom: 15px;
    border-radius: 16px;

    border: 2px solid rgba(255,255,255,0.08);
    box-shadow: inset 0 0 10px rgba(255,255,255,0.05);

    transition: transform 1.2s ease;
}

/* Rang 4+ subtil */
.team:not(.gold):not(.silver):not(.bronze) {
    border: 2px solid rgba(0, 200, 255, 0.15);
    box-shadow:
        0 0 12px rgba(0, 200, 255, 0.15),
        inset 0 0 8px rgba(255,255,255,0.04);
}

/* ================= MEDAL ================= */
.medal {
    font-size: 1.6em;
    text-align: center;
    width: 40px;
}

/* ================= RANK BOX ================= */
.rank-box {
    background: black;
    color: white;
    width: 60px;
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    border-radius: 10px;
    font-size: 18px;
}

/* ================= IMAGE ================= */
.team-img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
}

/* ================= TEAM NAME ================= */
.team-name {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);
    padding: 10px 16px;
    border-radius: 10px;
}

/* ================= POINTS ================= */
.punkte {
    background: white;
    color: black;
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: bold;
    text-align: right;
    box-shadow: 0 0 15px rgba(255,255,255,0.4);
}

/* ================= GLOW ================= */
.gold {
    box-shadow: 0 0 25px gold,
                0 0 50px rgba(255,215,0,0.4);
}

.silver {
    box-shadow: 0 0 25px silver,
                0 0 50px rgba(192,192,192,0.4);
}

.bronze {
    box-shadow: 0 0 25px #cd7f32,
                0 0 50px rgba(205,127,50,0.4);
}
</style>
</head>

<body>

<!-- ===== VIDEO HINTERGRUND ===== -->
<div class="video-background">
    <video autoplay muted loop playsinline>
        <source src="{{ url_for('static', filename='videos/hintergrund.mp4') }}" type="video/mp4">
        Dein Browser unterstützt das Video-Tag nicht.
    </video>
</div>

<h1>🏆 Live Scoreboard</h1>
<div id="scoreboard">
    <div class="column column-left"></div>
    <div class="column column-right"></div>
</div>

<script>
const leftColumn = document.querySelector(".column-left");
const rightColumn = document.querySelector(".column-right");
let teamElements = {};

function medalEmoji(rank) {
    if (rank === 1) return "🥇";
    if (rank === 2) return "🥈";
    if (rank === 3) return "🥉";
    return "";
}

function medalClass(rank) {
    if (rank === 1) return "gold";
    if (rank === 2) return "silver";
    if (rank === 3) return "bronze";
    return "";
}

async function fetchData() {
    const res = await fetch("/data");
    const data = await res.json();
    updateBoard(data);
}

function updateBoard(data) {

    const firstPositions = {};
    document.querySelectorAll(".team").forEach(el => {
        firstPositions[el.dataset.team] = el.getBoundingClientRect();
    });

    data.forEach(team => {

        let el = teamElements[team.Team];

        if (!el) {
            el = document.createElement("div");
            el.className = "team";
            el.dataset.team = team.Team;

            el.innerHTML = `
                <div class="medal"></div>
                <div class="rank-box"></div>
                <img class="team-img">
                <div class="team-name"></div>
                <div class="punkte"></div>
            `;

            teamElements[team.Team] = el;
            
        }

        el.querySelector(".medal").textContent = medalEmoji(team.Rank);
        el.querySelector(".rank-box").textContent = String(team.Rank).padStart(3,"0");
        el.querySelector(".team-img").src = "/static/images/" + team.Bild;
        el.querySelector(".team-name").textContent = team.Team;
        el.querySelector(".punkte").textContent = team.Punkte + " Punkte";

        el.className = "team " + medalClass(team.Rank);
    });

    // Spalten leeren (nur visuell, Animation bleibt erhalten)
leftColumn.innerHTML = "";
rightColumn.innerHTML = "";

data.forEach((team, index) => {

    const el = teamElements[team.Team];

    if (index < 5) {
        leftColumn.appendChild(el);   // max 5 links
    } else if (index < 10) {
        rightColumn.appendChild(el);  // max 5 rechts
    }
});

    const lastPositions = {};
    document.querySelectorAll(".team").forEach(el => {
        lastPositions[el.dataset.team] = el.getBoundingClientRect();
    });

    document.querySelectorAll(".team").forEach(el => {

        const first = firstPositions[el.dataset.team];
        const last = lastPositions[el.dataset.team];
        if (!first || !last) return;

        const deltaY = first.top - last.top;

        if (deltaY !== 0) {
            el.style.transition = "none";
            el.style.transform = `translateY(${deltaY}px)`;

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    el.style.transition = "transform 1.2s ease";
                    el.style.transform = "";
                });
            });
        }
    });
}

setInterval(fetchData, 2000);
fetchData();
</script>

</body>
</html>
